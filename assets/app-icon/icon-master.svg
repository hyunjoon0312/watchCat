<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Flat-style app icon: solid blue rounded square + minimal white cat
       silhouette with two black dot eyes. No gradient, no shadow, no
       detail beyond the eyes — matches the reference. -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="#1E8FE3"/>

  <!-- Cat head silhouette, slightly upper-left so it reads as a "peeking"
       face. The shape is the mascot's head with the bottom flattened so
       it sits like a pillow rather than a full body. -->
  <g transform="translate(150 200) scale(22)">
    <path d="M 5.2 15.2 Q 5 12.9 6.1 10.3 L 8.5 6.1 Q 9.1 5 10.3 5.5 L 14.1 8.8 Q 16 8.3 17.9 8.8 L 21.7 5.5 Q 22.9 5 23.5 6.1 L 25.9 10.3 Q 27 12.9 26.8 15.2 C 27.2 22.6 22.8 28 16 28 C 9.2 28 4.8 22.6 5.2 15.2 Z"
          fill="#FFFFFF"/>
  </g>

  <!-- Two clean eye dots — the only facial feature, matching the reference. -->
  <circle cx="395" cy="600" r="32" fill="#1A2030"/>
  <circle cx="600" cy="600" r="32" fill="#1A2030"/>
</svg>
