<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="3 3 26 26">
  <!-- Owl: round brown body, two horned ear tufts, huge concentric facial discs
       around the eyes, small yellow beak. The "watcher" mascot, thematically
       perfect for watchCat. -->
  <!-- Horn tufts -->
  <path d="M 8 7 L 10.5 5 L 10.8 9 Z" fill="#7A5234" stroke="#2A2A2A" stroke-width="1.1" stroke-linejoin="round"/>
  <path d="M 24 7 L 21.5 5 L 21.2 9 Z" fill="#7A5234" stroke="#2A2A2A" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Body (round) -->
  <path d="M 6 14 Q 6 8 16 8 Q 26 8 26 14 Q 26 26 16 28 Q 6 26 6 14 Z"
        fill="#9E7250" stroke="#2A2A2A" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Belly cream patch -->
  <path d="M 11 19 Q 16 26 21 19 Q 21 25 16 27 Q 11 25 11 19 Z" fill="#F4E0BE"/>
  <!-- Feather ticking on belly -->
  <path d="M 13.5 21 L 13.5 22 M 16 22 L 16 23 M 18.5 21 L 18.5 22 M 14.5 23.5 L 14.5 24.5 M 17.5 23.5 L 17.5 24.5"
        stroke="#7A5234" stroke-width="0.55" stroke-linecap="round"/>
  <!-- Facial discs (concentric circles) -->
  <circle cx="11.5" cy="17" r="3.4" fill="#F4E0BE" stroke="#2A2A2A" stroke-width="0.7"/>
  <circle cx="20.5" cy="17" r="3.4" fill="#F4E0BE" stroke="#2A2A2A" stroke-width="0.7"/>
  <circle cx="11.5" cy="17" r="2.1" fill="#FFF8EE"/>
  <circle cx="20.5" cy="17" r="2.1" fill="#FFF8EE"/>
  <!-- Pupils -->
  <circle cx="11.5" cy="17" r="1.5" fill="#1F1F1F"/>
  <circle cx="20.5" cy="17" r="1.5" fill="#1F1F1F"/>
  <circle cx="12.0" cy="16.4" r="0.5" fill="#FFFFFF"/>
  <circle cx="21.0" cy="16.4" r="0.5" fill="#FFFFFF"/>
  <!-- Beak (yellow triangle pointing down between discs) -->
  <path d="M 14.6 20 L 17.4 20 L 16 22.6 Z" fill="#F4B038" stroke="#2A2A2A" stroke-width="0.55" stroke-linejoin="round"/>
</svg>
